name: Flatten learning structure

on:
  push:
    branches: [main]
    paths:
      - scripts/flatten_learning_structure.py
      - .github/workflows/flatten-learning-structure.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flatten repository structure
        run: python scripts/flatten_learning_structure.py

      - name: Remove one-time migration files
        run: |
          rm -f scripts/flatten_learning_structure.py
          rm -f .github/workflows/flatten-learning-structure.yml
          rmdir scripts 2>/dev/null || true
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true

      - name: Commit flattened structure
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No structural changes were required."
            exit 0
          fi
          git commit -m "refactor: flatten learning directory structure [skip ci]"
          git push
