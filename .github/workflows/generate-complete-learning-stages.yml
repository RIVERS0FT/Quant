name: Generate complete learning stages

on:
  push:
    branches: [main]
    paths:
      - scripts/generate_stages_06_12.py
      - .github/workflows/generate-complete-learning-stages.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate stages 06-12
        run: python scripts/generate_stages_06_12.py
      - name: Commit generated learning paths
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stages/
          if git diff --cached --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git commit -m "补充第六至十二阶段完整学习路径 [skip ci]"
          git push
